---
- name: Initiate studio structural component deduplication sweeps
  ansible.builtin.command:
    cmd: "notebooklm --storage {{ project_root }}/.storage_clean_{{ client_item }}.json source list"
  register: workspace_sources
  changed_when: false

- name: Compile dynamic component asset generation structures
  ansible.builtin.command:
    cmd: "notebooklm --storage {{ project_root }}/.storage_asset_{{ client_item }}.json generate {{ item }}"
  loop:
    - "mind-map"
    - "data-table compare key concepts"
    - "slide-deck"
  failed_when: false
  changed_when: true

- name: Unlink intermediate runtime metadata cache profiles from host
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ project_root }}/.storage_{{ client_item }}.json"
    - "{{ project_root }}/.storage_clean_{{ client_item }}.json"
    - "{{ project_root }}/.storage_asset_{{ client_item }}.json"
