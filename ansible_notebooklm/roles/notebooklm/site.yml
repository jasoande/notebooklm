---
- name: Orchestrate Parallel NotebookLM Client Ingestion and Asset Generation
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    # CRITICAL ENVIRONMENT LINK: Force Ansible to use your current Homebrew-managed
    # Python runtime link to bypass any stale or broken system python hooks.
    ansible_python_interpreter: "{{ lookup('env', 'HOME') }}/.pyenv/shims/python3"

    # Project directory layout maps
    project_root: "{{ lookup('env', 'HOME') }}/Venella_2026/notebooklm"
    vars_py_path: "{{ project_root }}/vars.py"

    # Container engine specifications
    container_image_tag: "quay.io/jasoande/notebooklm-core-engine:latest"
    container_name: "notebooklm_task_worker"

    # Define the client profiles you want to actively queue up for execution.
    # These strings must explicitly match the prefix keys configured in your vars.py.
    clients:
      - merck_test
      - organon_test
      - blue_yonder_test
      - heshey_test
      - lord_abbett_test

  roles:
    - notebooklm
